# Render Blueprint cho backend CareerCompass. Deploy: Render dashboard → New →
# Blueprint → chọn repo này → Render tự đọc file này. Xem checklist bấm tay đầy đủ
# trong docs/DEPLOY.md.
services:
  - type: web
    name: careercompass-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -c "from pathlib import Path; assert Path('market.db').is_file(), 'market.db release artifact missing'"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: CHAT_API_BASE
        sync: false
      - key: CHAT_API_KEY
        sync: false
      - key: CHAT_MODEL
        sync: false
      - key: CHAT_STRUCTURED_METHOD
        value: prompt
      - key: DATABASE_URL
        value: sqlite:///./market.db
      - key: SESSIONS_DB_URL
        value: sqlite:///./sessions.db
      - key: CORS_ORIGINS
        sync: false # set = URL Vercel thật sau khi FE deploy, KHÔNG dùng "*"
      - key: DEMO_MODE
        value: "off"
      - key: AGENT_MODE
        value: langgraph
      - key: WEB_RESEARCH_MODE
        value: replay # switch to ddg only after docs/next DAY3 gate passes
      - key: WEB_RESEARCH_TIMEOUT_SECONDS
        value: "4"
      - key: WEB_RESEARCH_MAX_RESULTS
        value: "5"
      - key: WEB_RESEARCH_CACHE_TTL_SECONDS
        value: "900"
      - key: READINESS_READY_COVERAGE
        value: "0.75"
      - key: READINESS_NEAR_COVERAGE
        value: "0.45"
      - key: READINESS_MIN_EVIDENCE_SKILLS
        value: "2"
