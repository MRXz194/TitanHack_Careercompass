name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - name: Verify pinned AI stack imports
        run: python -c "import langchain_core, langchain_openai, langgraph"
      - run: python -m compileall app scripts tests
      - name: Unit and contract tests
        run: python -m pytest -q tests/unit tests/contract
      - name: Integration tests
        run: python -m pytest -q tests/integration
      - run: python -m scripts.check_routes

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run typecheck
      - run: npm run build
