name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install backend and data-test dependencies
        run: python -m pip install -r requirements.txt -r ../data/requirements.txt
      - name: Verify pinned AI stack imports
        run: python -c "import langchain_core, langchain_openai, langgraph"
      - run: python -m compileall app scripts tests
      - name: Unit and contract tests
        run: python -m pytest -q tests/unit tests/contract
      - name: Integration tests
        run: python -m pytest -q tests/integration
      - name: Offline end-to-end journeys
        run: python -m pytest -q tests/e2e
      - name: Show release workflow pipeline
        run: |
          set +e
          python -m scripts.show_workflow_pipeline --output workflow-pipeline.json
          pipeline_status=$?
          echo '## CareerCompass runtime workflow' >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat workflow-pipeline.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ "$pipeline_status" -ne 0 ]; then
            pipeline_error=$(python -c "import json; d=json.load(open('workflow-pipeline.json', encoding='utf-8')); print(d.get('error', {}).get('message', 'unknown pipeline error'))")
            echo "::error title=Runtime workflow pipeline failed::$pipeline_error"
          fi
          exit "$pipeline_status"
      - name: Upload workflow evidence
        if: ${{ always() && hashFiles('backend/workflow-pipeline.json') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: runtime-workflow-${{ github.sha }}
          path: backend/workflow-pipeline.json
          retention-days: 7
      - run: python -m scripts.check_routes

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - run: npm install
      - run: npm run typecheck
      - name: Unit tests (chat state machine, profile diff/patch, components)
        run: npm run test
      - run: npm run build
